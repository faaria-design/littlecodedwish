<!DOCTYPE html>
<html>
<head>
  <title>Birthday ✨</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f5d0fe, #ddd6fe, #bae6fd);
      color: #1e293b;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      margin-top: 120px;
      overflow: hidden;
    }

    #box {
      display: inline-block;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(167,139,250,0.3);
      animation: fadeIn 1.5s ease;
      position: relative;
      z-index: 10;
    }

    h2 {
      color: #7c3aed;
      font-weight: 500;
    }

    p {
      font-size: 15px;
      line-height: 1.8;
    }

    button {
      margin-top: 20px;
      padding: 10px 22px;
      border: none;
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      color: white;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px #a78bfa;
    }

    span {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ✨ sparkles */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

<!-- 🎧 LOFI MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
</audio>

<div id="box">
  <h2>💌 a lil message for you</h2>
  <p id="text"></p>
  <button onclick="start(); document.getElementById('music').play();">Open 🎉</button>
</div>

<script>
let msg = [
"✨ Happy Birthday Utsu didi ✨",
"",
"lil late but had to make something proper 😭🫶",
"",
"you really saw me at my messiest and didn’t run away… impressive honestly 🫶",
"",
"no gifts 💀 but pls accept this high effort low budget creation 😌💻",
"",
"hope your day was full of good vibes, food, and zero drama ✨",
"stay the same (and still my fav Pomeranian 🐾)"
];

let i = 0;
let j = 0;

function start() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  j = 0;
  typeChar();
}

function typeChar() {
  if (i < msg.length) {
    if (j < msg[i].length) {
      document.getElementById("text").innerHTML += msg[i][j];
      j++;
      setTimeout(typeChar, 25);
    } else {
      document.getElementById("text").innerHTML += "<br>";
      i++;
      j = 0;
      setTimeout(typeChar, 300);
    }
  }
}

/* ✨ generate sparkles */
for (let k = 0; k < 25; k++) {
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(s);
}
</script>

</body>
</html>
